<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crime Lab Explorer - Forensic Science</title>
    <style>
        /* Pura page cover karne ke liye */
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: sans-serif; }
        
        /* Lovable Website ka frame */
        #website-frame { border: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        
        /* Chatbot ko corner mein dikhane ke liye style */
        #chatbot-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 400px;
            height: 600px;
            z-index: 9999;
            border: 1px solid #ccc;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            background: white;
        }
        
        /* Mobile ke liye responsive chatbot */
        @media (max-width: 500px) {
            #chatbot-container { width: 90%; height: 70%; right: 5%; bottom: 10px; }
        }
    </style>
</head>
<body>

    <iframe id="website-frame" src="https://crime-lab-explorer.lovable.app"></iframe>

    <div id="chatbot-container">
        <iframe src="https://www.chatbase.co/chatbot-iframe/0QRxdmrGK5i-0ejL-eyN5" width="100%" height="100%" frameborder="0"></iframe>
    </div>

</body>
</html>
